<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PandoX</title>
  <script src="https://cdn.jsdelivr.net/npm/@worldcoin/minikit-js@latest/dist/index.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/supabase.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --neon-blue: #00f0ff;
      --gold-premium: #ffd700;
      --gold-dark: #d4af37;
      --bg-dark: #000022;
      --card-bg: rgba(8, 8, 45, 0.75);
      --text-light: #f0faff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(135deg, var(--bg-dark) 0%, #000044 100%);
      color: var(--text-light);
      min-height: 100vh;
      padding: 15px;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?auto=format&fit=crop&w=2000&q=80') center/cover;
      opacity: 0.12;
      z-index: -2;
      animation: bgTwinkle 20s infinite alternate;
    }

    @keyframes bgTwinkle {
      0%, 100% { opacity: 0.12; }
      50% { opacity: 0.18; }
    }

    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
    }

    .particle {
      position: absolute;
      background: var(--gold-premium);
      border-radius: 50%;
      opacity: 0;
      animation: particleFloat 25s infinite linear;
    }

    @keyframes particleFloat {
      0% { transform: translateY(120vh) scale(0.1); opacity: 0; }
      20% { opacity: 0.8; }
      80% { opacity: 0.8; }
      100% { transform: translateY(-30vh) scale(0.6); opacity: 0; }
    }

    h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 3.6em;
      background: linear-gradient(90deg, var(--gold-premium), var(--neon-blue), var(--gold-premium));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
      margin: 30px 0 20px;
      letter-spacing: 5px;
      text-align: center;
      animation: titleShine 5s infinite linear;
    }

    @keyframes titleShine {
      0% { background-position: -200%; }
      100% { background-position: 200%; }
    }

    .logo {
      width: 280px;
      height: 280px;
      border-radius: 50%;
      border: 10px double var(--gold-premium);
      box-shadow: 0 0 80px var(--gold-premium), inset 0 0 40px var(--neon-blue);
      margin: 40px auto;
      display: block;
      animation: logoSpinGlow 8s infinite linear;
    }

    @keyframes logoSpinGlow {
      0% { transform: rotate(0deg) scale(1); box-shadow: 0 0 80px var(--gold-premium); }
      50% { transform: rotate(180deg) scale(1.03); box-shadow: 0 0 120px var(--neon-blue); }
      100% { transform: rotate(360deg) scale(1); box-shadow: 0 0 80px var(--gold-premium); }
    }

    .section {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      border-radius: 32px;
      padding: 40px 25px;
      margin: 45px 0;
      border: 1px solid rgba(255, 215, 0, 0.3);
      box-shadow: 0 20px 60px rgba(0, 255, 255, 0.2);
      transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .section:hover {
      transform: translateY(-12px) scale(1.02);
      box-shadow: 0 30px 80px rgba(255, 215, 0, 0.35);
    }

    h2 {
      font-family: 'Montserrat', sans-serif;
      font-size: 2.4em;
      color: var(--neon-blue);
      text-shadow: 0 0 20px var(--neon-blue);
      margin-bottom: 30px;
      text-align: center;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    .social-btn, .earn-btn {
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, var(--gold-premium), var(--gold-dark));
      color: #000;
      border: none;
      padding: 18px 40px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1.2em;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(255, 215, 0, 0.5);
      transition: all 0.4s ease;
    }

    .social-btn::after, .earn-btn::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 0; height: 0;
      background: rgba(255,255,255,0.3);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.6s ease, height 0.6s ease;
      pointer-events: none;
    }

    .social-btn:active::after, .earn-btn:active::after {
      width: 300px; height: 300px;
    }

    .social-btn:hover, .earn-btn:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 45px rgba(0, 255, 255, 0.6);
    }

    .earn-btn {
      background: linear-gradient(135deg, var(--neon-blue), var(--gold-premium));
      padding: 22px 70px;
      font-size: 1.35em;
    }

    .earn-btn:disabled {
      background: #444;
      box-shadow: none;
      color: #888;
    }

    #status {
      margin: 40px 0;
      font-size: 1.6em;
      color: var(--gold-premium);
      text-shadow: 0 0 20px var(--gold-premium);
      font-weight: 500;
      text-align: center;
    }

    .subtitle {
      font-size: 1.7em;
      color: var(--text-light);
      margin: 25px 0;
      text-align: center;
      opacity: 0.95;
    }

    #ranking {
      display: grid;
      gap: 15px;
      margin-top: 40px;
    }

    .rank-card {
      background: rgba(0, 0, 0, 0.7);
      border-radius: 20px;
      padding: 18px;
      border: 1px solid rgba(255, 215, 0, 0.4);
      box-shadow: 0 5px 20px rgba(0, 255, 255, 0.2);
      transition: all 0.3s ease;
      animation: fadeInUp 0.8s ease-out forwards;
      opacity: 0;
    }

    .rank-card:nth-child(1) { animation-delay: 0.1s; }
    .rank-card:nth-child(2) { animation-delay: 0.2s; }
    .rank-card:nth-child(3) { animation-delay: 0.3s; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .rank-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 40px rgba(255, 215, 0, 0.4);
    }

    .rank-position {
      font-size: 1.8em;
      font-weight: bold;
      color: var(--gold-premium);
      margin-bottom: 8px;
    }

    #nextClaim {
      font-size: 1.5em;
      color: var(--gold-premium);
      margin: 25px 0;
      font-weight: bold;
      text-align: center;
    }

    #referralSection {
      margin: 35px 0;
      text-align: center;
    }

    #referralInput {
      width: 100%;
      max-width: 380px;
      padding: 18px;
      border-radius: 50px;
      border: 2px solid var(--gold-premium);
      background: rgba(5, 5, 40, 0.9);
      color: white;
      font-size: 1.3em;
      text-align: center;
      box-shadow: inset 0 0 20px rgba(255, 215, 0, 0.3);
    }

    #copyReferralBtn {
      margin-top: 15px;
      background: var(--gold-premium);
      color: #000;
      padding: 14px 40px;
      border-radius: 50px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 5px 20px rgba(255, 215, 0, 0.5);
    }

    #disconnectBtn {
      background: linear-gradient(#ff4444, #cc0000);
      color: white;
    }

    canvas#confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
    }
  </style>
</head>
<body>

  <div class="particles" id="particles"></div>
  <canvas id="confetti"></canvas>

  <img src="https://raw.githubusercontent.com/pandoxofficial12-dev/PandoX-Earn-Official-/main/logo-pandox.png" alt="PandoX Logo" class="logo">

  <h1>PandoX</h1>
  <p class="subtitle">Conecta tu wallet • Reclama cada 6 horas • Invita y gana</p>

      <a href="https://t.me/pandoxofficial" target="_blank" class="social-btn">Telegram Grupo</a>
      <a href="https://t.me/pandoxchannel" target="_blank" class="social-btn">Canal Telegram</a>
      <a href="https://worldscan.org/address/0xF968341A687D70BcF84121111CfBB5eF7148AC28" target="_blank" class="social-btn">Contrato PDX</a>

  </div>

  <div class="section">

    <div id="referralSection">

    <div id="status">Abre en World App para empezar</div>

    <div id="ranking"><b>Ranking Top 10</b><br>Cargando...</div>
  </div>

<script>
// Partículas doradas flotantes
function createParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 40; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    const size = Math.random() * 5 + 2;
    particle.style.width = particle.style.height = size + 'px';
    particle.style.left = Math.random() * 100 + 'vw';
    particle.style.animationDelay = Math.random() * 20 + 's';
    particle.style.animationDuration = Math.random() * 30 + 30 + 's';
    container.appendChild(particle);
  }
}
createParticles();

// Confeti dorado al claim exitoso
function launchConfetti() {
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const particles = [];
  for (let i = 0; i < 100; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      size: Math.random() * 8 + 4,
      speed: Math.random() * 5 + 2,
      rotation: Math.random() * 360,
      color: ['#FFD700', '#FFEA00', '#FFFF99'][Math.floor(Math.random() * 3)]
    });
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = 0.8;
      ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
      ctx.restore();

      p.y += p.speed;
      p.rotation += 2;
      if (p.y > canvas.height) p.y = -p.size;
    });
    requestAnimationFrame(animate);
  }
  animate();

  setTimeout(() => { canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height); }, 5000);
}
