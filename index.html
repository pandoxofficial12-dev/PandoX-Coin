<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PandoX</title>
  <script src="https://cdn.jsdelivr.net/npm/@worldcoin/minikit-js@latest/dist/index.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/supabase.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --neon-blue: #00f0ff;
      --gold-premium: #ffd700;
      --gold-dark: #d4af37;
      --bg-dark: #000022;
      --card-bg: rgba(5, 5, 40, 0.85);
      --text-light: #f0faff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(135deg, var(--bg-dark) 0%, #000044 100%);
      color: var(--text-light);
      min-height: 100vh;
      padding: 15px;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?auto=format&fit=crop&w=2000&q=80') center/cover;
      opacity: 0.14;
      z-index: -2;
    }

    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      opacity: 0;
      animation: particleFloat 35s infinite linear;
      box-shadow: 0 0 20px;
    }

    .particle.gold { background: var(--gold-premium); box-shadow: 0 0 20px var(--gold-premium); }
    .particle.neon { background: var(--neon-blue); box-shadow: 0 0 20px var(--neon-blue); }

    @keyframes particleFloat {
      0% { transform: translateY(130vh) scale(0.1) rotate(0deg); opacity: 0; }
      15% { opacity: 0.9; }
      85% { opacity: 0.9; }
      100% { transform: translateY(-50vh) scale(0.7) rotate(720deg); opacity: 0; }
    }

    h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 4em;
      background: linear-gradient(90deg, var(--gold-premium), var(--neon-blue), var(--gold-premium));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 40px rgba(255, 215, 0, 0.8);
      margin: 40px 0 25px;
      letter-spacing: 7px;
      text-align: center;
      animation: titleShine 7s infinite linear;
    }

    @keyframes titleShine {
      0% { background-position: -400%; }
      100% { background-position: 400%; }
    }

    .logo {
      width: 320px;
      height: 320px;
      border-radius: 50%;
      border: 14px double var(--gold-premium);
      box-shadow: 0 0 120px var(--gold-premium), inset 0 0 60px var(--neon-blue);
      margin: 50px auto;
      display: block;
      animation: logoSpinGlow 12s infinite linear;
    }

    @keyframes logoSpinGlow {
      0% { transform: rotate(0deg) scale(1); box-shadow: 0 0 120px var(--gold-premium); }
      50% { transform: rotate(180deg) scale(1.05); box-shadow: 0 0 160px var(--neon-blue); }
      100% { transform: rotate(360deg) scale(1); box-shadow: 0 0 120px var(--gold-premium); }
    }

    .section {
      background: var(--card-bg);
      backdrop-filter: blur(24px);
      border-radius: 40px;
      padding: 50px 30px;
      margin: 55px 0;
      border: 1px solid rgba(255, 215, 0, 0.4);
      box-shadow: 0 30px 90px rgba(0, 255, 255, 0.3);
      transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .section:hover {
      transform: translateY(-18px) scale(1.03);
      box-shadow: 0 50px 120px rgba(255, 215, 0, 0.45);
    }

    h2 {
      font-family: 'Montserrat', sans-serif;
      font-size: 2.8em;
      color: var(--neon-blue);
      text-shadow: 0 0 30px var(--neon-blue);
      margin-bottom: 40px;
      text-align: center;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 25px;
      justify-content: center;
    }

    .social-btn, .earn-btn, #copyReferralBtn, #shareXBtn {
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, var(--gold-premium), var(--gold-dark));
      color: #000;
      border: none;
      padding: 20px 50px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1.3em;
      cursor: pointer;
      box-shadow: 0 12px 35px rgba(255, 215, 0, 0.55);
      transition: all 0.5s ease;
    }

    .social-btn::after, .earn-btn::after, #copyReferralBtn::after, #shareXBtn::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 0; height: 0;
      background: radial-gradient(circle, rgba(255,255,255,0.45) 0%, transparent 70%);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 1s ease, height 1s ease;
      pointer-events: none;
    }

    .social-btn:active::after, .earn-btn:active::after, #copyReferralBtn:active::after, #shareXBtn:active::after {
      width: 500px; height: 500px;
    }

    .social-btn:hover, .earn-btn:hover, #copyReferralBtn:hover, #shareXBtn:hover {
      transform: translateY(-8px);
      box-shadow: 0 25px 70px rgba(0, 255, 255, 0.7);
    }

    .earn-btn {
      background: linear-gradient(135deg, var(--neon-blue), var(--gold-premium));
      padding: 25px 90px;
      font-size: 1.45em;
    }

    .earn-btn:disabled {
      background: #444;
      box-shadow: none;
      color: #888;
    }

    #status {
      margin: 50px 0;
      font-size: 1.8em;
      color: var(--gold-premium);
      text-shadow: 0 0 30px var(--gold-premium);
      font-weight: 500;
      text-align: center;
    }

    .subtitle {
      font-size: 1.9em;
      color: var(--text-light);
      margin: 35px 0;
      text-align: center;
      opacity: 0.95;
    }

    #ranking {
      display: grid;
      gap: 25px;
      margin-top: 50px;
    }

    .rank-card {
      background: rgba(0, 0, 0, 0.8);
      border-radius: 28px;
      padding: 25px;
      border: 1px solid rgba(255, 215, 0, 0.5);
      box-shadow: 0 10px 40px rgba(0, 255, 255, 0.3);
      transition: all 0.5s ease;
      animation: fadeInUp 1.2s ease-out forwards;
      opacity: 0;
    }

    .rank-card:nth-child(1) { animation-delay: 0.3s; }
    .rank-card:nth-child(2) { animation-delay: 0.5s; }
    .rank-card:nth-child(3) { animation-delay: 0.7s; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(50px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .rank-card:hover {
      transform: translateY(-12px);
      box-shadow: 0 25px 80px rgba(255, 215, 0, 0.6);
    }

    .rank-position {
      font-size: 2.2em;
      font-weight: bold;
      color: var(--gold-premium);
      margin-bottom: 12px;
    }

    #nextClaim {
      font-size: 1.7em;
      color: var(--gold-premium);
      margin: 35px 0;
      font-weight: bold;
      text-align: center;
    }

    #referralSection {
      margin: 45px 0;
      text-align: center;
    }

    #referralInput {
      width: 100%;
      max-width: 420px;
      padding: 22px;
      border-radius: 50px;
      border: 2px solid var(--gold-premium);
      background: rgba(5, 5, 40, 0.95);
      color: white;
      font-size: 1.4em;
      text-align: center;
      box-shadow: inset 0 0 30px rgba(255, 215, 0, 0.4);
    }

    #copyReferralBtn, #shareXBtn {
      margin-top: 20px;
      background: var(--gold-premium);
      color: #000;
      padding: 18px 60px;
      border-radius: 50px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 8px 30px rgba(255, 215, 0, 0.6);
    }

    #disconnectBtn {
      background: linear-gradient(#ff4444, #cc0000);
      color: white;
    }

    canvas#confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
    }
  </style>
</head>
<body>

<script>
// Partículas doradas y neón flotantes
function createParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 80; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    if (i % 2 === 0) particle.classList.add('neon');
    const size = Math.random() * 7 + 3;
    particle.style.width = particle.style.height = size + 'px';
    particle.style.left = Math.random() * 100 + 'vw';
    particle.style.animationDelay = Math.random() * 30 + 's';
    particle.style.animationDuration = Math.random() * 40 + 40 + 's';
    container.appendChild(particle);
  }
}
createParticles();

// Confeti dorado y azul al claim exitoso
function launchConfetti() {
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const particles = [];
  for (let i = 0; i < 200; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      size: Math.random() * 12 + 6,
      speed: Math.random() * 8 + 4,
      rotation: Math.random() * 720,
      color: ['#FFD700', '#FFEA00', '#00f0ff', '#FFFFFF', '#FFFF99'][Math.floor(Math.random() * 5)]
    });
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = 0.9;
      ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
      ctx.restore();

      p.y += p.speed;
      p.rotation += 6;
      if (p.y > canvas.height) p.y = -p.size;
    });
    requestAnimationFrame(animate);
  }
  animate();

  setTimeout(() => { canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height); }, 8000);
}

});
