<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PandoX</title>
  <script src="https://cdn.jsdelivr.net/npm/@worldcoin/minikit-js@latest/dist/index.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/supabase.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --neon-blue: #00ffff;
      --gold-premium: #FFD700;
      --gold-dark: #D4AF37;
      --bg-dark: #000022;
      --card-bg: rgba(5, 5, 40, 0.7);
      --text-light: #f0faff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(135deg, var(--bg-dark) 0%, #000033 100%);
      color: var(--text-light);
      min-height: 100vh;
      padding: 20px 15px;
      overflow-x: hidden;
      position: relative;
    }

    /* Fondo espacial con partículas doradas flotantes */
    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?auto=format&fit=crop&w=2000&q=80') center/cover no-repeat;
      opacity: 0.12;
      z-index: -2;
    }

    .particles {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      background: var(--gold-premium);
      border-radius: 50%;
      opacity: 0.6;
      animation: float 15s infinite linear;
    }

    @keyframes float {
      0% { transform: translateY(100vh) scale(0.2); opacity: 0.1; }
      100% { transform: translateY(-20vh) scale(0.8); opacity: 0.8; }
    }

    h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 3.4em;
      color: var(--gold-premium);
      text-shadow: 0 0 25px var(--gold-premium), 0 0 50px var(--neon-blue);
      margin: 25px 0 15px;
      letter-spacing: 4px;
      animation: titlePulse 4s infinite alternate;
      text-align: center;
    }

    @keyframes titlePulse {
      from { text-shadow: 0 0 25px var(--gold-premium); }
      to { text-shadow: 0 0 50px var(--neon-blue), 0 0 70px var(--gold-premium); }
    }

    .logo {
      width: 260px;
      height: 260px;
      border-radius: 50%;
      border: 8px solid rgba(255, 215, 0, 0.6);
      box-shadow: 0 0 60px var(--gold-premium), inset 0 0 30px var(--neon-blue);
      margin: 40px auto;
      display: block;
      animation: logoGlow 5s infinite alternate;
    }

    @keyframes logoGlow {
      from { box-shadow: 0 0 60px var(--gold-premium); transform: rotate(0deg); }
      to { box-shadow: 0 0 90px var(--neon-blue); transform: rotate(3deg); }
    }

    .section {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border-radius: 30px;
      padding: 35px 25px;
      margin: 40px 0;
      border: 1px solid rgba(255, 215, 0, 0.25);
      box-shadow: 0 15px 45px rgba(0, 255, 255, 0.18);
      transition: all 0.4s ease;
    }

    .section:hover {
      transform: translateY(-10px);
      box-shadow: 0 25px 60px rgba(255, 215, 0, 0.3);
    }

    h2 {
      font-family: 'Montserrat', sans-serif;
      color: var(--neon-blue);
      font-size: 2.3em;
      margin-bottom: 25px;
      text-shadow: 0 0 15px var(--neon-blue);
      text-align: center;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    .social-btn {
      background: linear-gradient(135deg, var(--gold-premium), var(--gold-dark));
      color: #000;
      border: none;
      padding: 16px 38px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 1.15em;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 6px 20px rgba(255, 215, 0, 0.45);
      transition: all 0.4s ease;
      position: relative;
      overflow: hidden;
    }

    .social-btn::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%; width: 200%; height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
      transform: translateX(-100%) translateY(-100%);
      transition: all 0.6s ease;
    }

    .social-btn:hover::before {
      transform: translateX(0) translateY(0);
    }

    .social-btn:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 40px rgba(0, 255, 255, 0.5);
    }

    .earn-btn {
      background: linear-gradient(135deg, var(--neon-blue), var(--gold-premium));
      color: #000;
      border: none;
      padding: 20px 70px;
      border-radius: 50px;
      font-size: 1.4em;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 10px 35px rgba(0, 255, 255, 0.55);
      transition: all 0.4s ease;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      position: relative;
      overflow: hidden;
    }

    .earn-btn::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%; width: 200%; height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, transparent 70%);
      transform: translateX(-100%) translateY(-100%);
      transition: all 0.6s ease;
    }

    .earn-btn:hover::before {
      transform: translateX(0) translateY(0);
    }

    .earn-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 20px 55px rgba(255, 215, 0, 0.7);
    }

    .earn-btn:disabled {
      background: linear-gradient(#444, #333);
      box-shadow: none;
      color: #777;
      cursor: not-allowed;
    }

    #status {
      margin: 35px 0;
      font-size: 1.5em;
      color: var(--gold-premium);
      text-shadow: 0 0 15px var(--gold-premium);
      font-weight: 500;
      text-align: center;
    }

    .subtitle {
      font-size: 1.6em;
      color: var(--text-light);
      margin: 20px 0;
      opacity: 0.92;
      text-align: center;
    }

    #ranking {
      background: rgba(0, 0, 0, 0.65);
      border-radius: 22px;
      padding: 28px;
      margin-top: 40px;
      border: 1px solid rgba(255, 215, 0, 0.35);
      box-shadow: 0 10px 35px rgba(0, 255, 255, 0.25);
      animation: fadeIn 1.8s ease-out;
    }

    #nextClaim {
      font-size: 1.45em;
      color: var(--gold-premium);
      margin: 20px 0;
      font-weight: bold;
      text-align: center;
    }

    #referralSection {
      margin: 30px 0;
      text-align: center;
    }

    #referralInput {
      width: 100%;
      max-width: 360px;
      padding: 18px;
      border-radius: 50px;
      border: 2px solid var(--gold-premium);
      background: rgba(5, 5, 40, 0.85);
      color: white;
      font-size: 1.25em;
      text-align: center;
      box-shadow: inset 0 0 20px rgba(255, 215, 0, 0.25);
    }

    #disconnectBtn {
      background: linear-gradient(#ff4444, #aa0000);
      color: white;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="particles" id="particles"></div>

  <img src="https://raw.githubusercontent.com/pandoxofficial12-dev/PandoX-Earn-Official-/main/logo-pandox.png" alt="PandoX Logo" class="logo">

  <h1>PandoX</h1>
  <p class="subtitle">Conecta, reclama PDX cada 6 horas e invita amigos</p>

  <div class="section">
    <h2>Comunidad PandoX</h2>
    <div class="buttons">
      <a href="https://x.com/pandoxofficial" target="_blank" class="social-btn">X Oficial</a>
      <a href="https://t.me/pandoxofficial" target="_blank" class="social-btn">Telegram Grupo</a>
      <a href="https://t.me/pandoxchannel" target="_blank" class="social-btn">Canal Telegram</a>
      <a href="https://worldscan.org/address/0xF968341A687D70BcF84121111CfBB5eF7148AC28" target="_blank" class="social-btn">Contrato PDX</a>
    </div>
  </div>

  <div class="section">
    <h2>Gana PDX</h2>
    <div id="referralSection">
      <p>Wallet de referido (opcional - bonus para ambos)</p>
      <input type="text" id="referralInput" placeholder="0x...">
    </div>
    <button id="subscribeBtn" class="earn-btn">Conectar Wallet</button>
    <button id="claimBtn" class="earn-btn" disabled>Reclamar PDX</button>
    <button id="viewBalanceBtn" class="earn-btn" disabled>Ver Saldo / Posición</button>
    <button id="disconnectBtn" class="earn-btn" style="display:none;">Desconectar Wallet</button>
    <div id="status">Abre en World App para comenzar</div>
    <div id="nextClaim"></div>
    <div id="ranking"><b>Ranking Top 10</b><br>Cargando...</div>
  </div>

</body>
</html>
